<script>
  // URL CSV dari Google Sheets kamu
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkGGJUeTYJw09T7R-CnYABJFTxS8nHETcIGY84J4kOYD4H9lDjvZB_53FbB0wEDqvICfNHdFWvos8/pub?gid=0&single=true&output=csv";

  async function fetchCSV(url) {
    const response = await fetch(url);
    if (!response.ok) {
      throw new Error("HTTP error " + response.status);
    }
    const text = await response.text();
    return text;
  }

  function parseCSV(csvText) {
    const lines = csvText.trim().split("\n");
    const headers = lines[0].split(",").map(h => h.trim());
    const rows = [];

    for (let i = 1; i < lines.length; i++) {
      if (!lines[i].trim()) continue;
      const values = parseCSVLine(lines[i]);
      const row = {};
      headers.forEach((header, index) => {
        row[header] = values[index] ? values[index].trim() : "";
      });
      rows.push(row);
    }
    return rows;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let insideQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === "," && !insideQuotes) {
        result.push(current);
        current = "";
      } else {
        current += char;
      }
    }
    result.push(current);
    return result;
  }

  function toNumber(value) {
    if (value === undefined || value === null) return 0;
    const trimmed = String(value).trim();
    if (!trimmed || trimmed === "-" || trimmed === "–") return 0;
    const num = Number(trimmed.replace(",", "."));
    return isNaN(num) ? 0 : num;
  }

  function formatPOS(value) {
    const trimmed = String(value || "").trim();
    if (!trimmed || trimmed === "0") return "<span class='pos-empty'>—</span>";
    if (trimmed === "-" || trimmed === "–") return "<span class='pos-empty'>—</span>";
    return trimmed;
  }

  function renderTable(data) {
    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");
    const tableEl = document.getElementById("klasemen-table");
    const tbody = document.getElementById("klasemen-body");

    loadingEl.style.display = "none";
    errorEl.style.display = "none";
    tableEl.style.display = "table";

    // Sesuai header: No, NAMA_KANDANG, POS_1..POS_11, Total
    const enriched = data.map(row => {
      const total = toNumber(row["Total"]);
      const no = row["No"] || "";
      const nama = row["NAMA_KANDANG"] || "";
      return { row, total, no, nama };
    });

    // Urutkan berdasarkan Total (besar ke kecil)
    enriched.sort((a, b) => b.total - a.total);

    tbody.innerHTML = "";

    let maxTotal = 0;
    let pesertaCount = 0;

    const TOP_N = 10; // label saja untuk TOP 10

    enriched.forEach((item, index) => {
      const row = item.row;
      const rank = index + 1;
      const total = item.total;

      if (total > 0) {
        pesertaCount++;
        if (total > maxTotal) maxTotal = total;
      }

      // Baris "TOP 10" sebelum peringkat 1
      if (rank === 1) {
        const sectionTr = document.createElement("tr");
        sectionTr.className = "section-row";
        sectionTr.innerHTML = `
          <td></td>
          <td class="section-label">TOP 10</td>
          <td colspan="11"></td>
          <td></td>
        `;
        tbody.appendChild(sectionTr);
      }

      let medalHTML = "";
      if (rank === 1) medalHTML = "<span class='medal medal-gold'>1</span>";
      else if (rank === 2) medalHTML = "<span class='medal medal-silver'>2</span>";
      else if (rank === 3) medalHTML = "<span class='medal medal-bronze'>3</span>";

      const nameHTML = `
        <div class="name-cell">
          ${medalHTML}
          <div class="name-text">${item.nama || "-"}</div>
        </div>
      `;

      const pos1 = row["POS_1"];
      const pos2 = row["POS_2"];
      const pos3 = row["POS_3"];
      const pos4 = row["POS_4"];
      const pos5 = row["POS_5"];
      const pos6 = row["POS_6"];
      const pos7 = row["POS_7"];
      const pos8 = row["POS_8"];
      const pos9 = row["POS_9"];
      const pos10 = row["POS_10"];
      const pos11 = row["POS_11"];

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td class="numeric rank-cell">${rank}</td>
        <td>${nameHTML}</td>
        <td class="numeric">${formatPOS(pos1)}</td>
        <td class="numeric">${formatPOS(pos2)}</td>
        <td class="numeric">${formatPOS(pos3)}</td>
        <td class="numeric">${formatPOS(pos4)}</td>
        <td class="numeric">${formatPOS(pos5)}</td>
        <td class="numeric">${formatPOS(pos6)}</td>
        <td class="numeric">${formatPOS(pos7)}</td>
        <td class="numeric">${formatPOS(pos8)}</td>
        <td class="numeric">${formatPOS(pos9)}</td>
        <td class="numeric">${formatPOS(pos10)}</td>
        <td class="numeric">${formatPOS(pos11)}</td>
        <td class="numeric total-cell">${total || "0"}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById("stat-total-peserta").textContent = pesertaCount;
    document.getElementById("stat-max-poin").textContent = maxTotal || "0";
  }

  async function init() {
    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");
    const tableEl = document.getElementById("klasemen-table");

    try {
      loadingEl.style.display = "block";
      tableEl.style.display = "none";

      const csvText = await fetchCSV(CSV_URL);
      const data = parseCSV(csvText);

      if (!data || data.length === 0) {
        throw new Error("Data kosong");
      }

      renderTable(data);
    } catch (err) {
      console.error(err);
      loadingEl.style.display = "none";
      errorEl.style.display = "block";
    }
  }

  init();
</script>
