<script>
  // URL CSV Google Sheets
  const CSV_URL =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkGGJUeTYJw09T7R-CnYABJFTxS8nHETcIGY84J4kOYD4H9lDjvZB_53FbB0wEDqvICfNHdFWvos8/pub?gid=0&single=true&output=csv";

  async function fetchCSV(url) {
    const response = await fetch(url);

    if (!response.ok) {
      throw new Error("Gagal mengambil data CSV");
    }

    return await response.text();
  }

  function parseCSV(csv) {
    const lines = csv.split("\n");

    // Cari header yang mengandung NAMA_KANDANG
    let headerIndex = lines.findIndex(line =>
      line.includes("NAMA_KANDANG")
    );

    if (headerIndex === -1) {
      throw new Error("Header tabel tidak ditemukan");
    }

    const headers = lines[headerIndex]
      .split(",")
      .map(h => h.trim());

    const rows = [];

    for (let i = headerIndex + 1; i < lines.length; i++) {
      const line = lines[i].trim();

      if (!line) continue;

      const values = parseCSVLine(line);

      const row = {};

      headers.forEach((header, index) => {
        row[header] = values[index]
          ? values[index].trim()
          : "";
      });

      // hanya ambil baris yang punya nama kandang
      if (row["NAMA_KANDANG"]) {
        rows.push(row);
      }
    }

    return rows;
  }

  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let insideQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];

      if (char === '"') {
        insideQuotes = !insideQuotes;
      } else if (char === "," && !insideQuotes) {
        result.push(current);
        current = "";
      } else {
        current += char;
      }
    }

    result.push(current);

    return result;
  }

  function toNumber(value) {
    if (!value) return 0;

    const cleaned = String(value)
      .replace(",", ".")
      .replace(/[^\d.-]/g, "");

    const num = Number(cleaned);

    return isNaN(num) ? 0 : num;
  }

  function formatPOS(value) {
    if (!value || value === "-" || value === "0") {
      return "<span class='pos-empty'>—</span>";
    }

    return value;
  }

  function renderTable(data) {
    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");
    const tableEl = document.getElementById("klasemen-table");
    const tbody = document.getElementById("klasemen-body");

    loadingEl.style.display = "none";
    errorEl.style.display = "none";
    tableEl.style.display = "table";

    // urutkan berdasarkan total
    data.sort((a, b) => {
      return toNumber(b["Total"]) - toNumber(a["Total"]);
    });

    tbody.innerHTML = "";

    let maxTotal = 0;

    data.forEach((row, index) => {
      const rank = index + 1;

      const total = toNumber(row["Total"]);

      if (total > maxTotal) {
        maxTotal = total;
      }

      let medalHTML = "";

      if (rank === 1) {
        medalHTML = "<span class='medal medal-gold'>1</span>";
      } else if (rank === 2) {
        medalHTML = "<span class='medal medal-silver'>2</span>";
      } else if (rank === 3) {
        medalHTML = "<span class='medal medal-bronze'>3</span>";
      }

      const tr = document.createElement("tr");

      tr.innerHTML = `
        <td class="numeric rank-cell">${rank}</td>

        <td>
          <div class="name-cell">
            ${medalHTML}
            <div class="name-text">
              ${row["NAMA_KANDANG"] || "-"}
            </div>
          </div>
        </td>

        <td class="numeric">${formatPOS(row["POS_1"])}</td>
        <td class="numeric">${formatPOS(row["POS_2"])}</td>
        <td class="numeric">${formatPOS(row["POS_3"])}</td>
        <td class="numeric">${formatPOS(row["POS_4"])}</td>
        <td class="numeric">${formatPOS(row["POS_5"])}</td>
        <td class="numeric">${formatPOS(row["POS_6"])}</td>
        <td class="numeric">${formatPOS(row["POS_7"])}</td>
        <td class="numeric">${formatPOS(row["POS_8"])}</td>
        <td class="numeric">${formatPOS(row["POS_9"])}</td>
        <td class="numeric">${formatPOS(row["POS_10"])}</td>
        <td class="numeric">${formatPOS(row["POS_11"])}</td>

        <td class="numeric total-cell">
          ${total}
        </td>
      `;

      tbody.appendChild(tr);
    });

    // update statistik
    document.getElementById("stat-total-peserta").textContent =
      data.length;

    document.getElementById("stat-max-poin").textContent =
      maxTotal;
  }

  async function init() {
    const loadingEl = document.getElementById("loading");
    const errorEl = document.getElementById("error");

    try {
      loadingEl.style.display = "block";

      const csvText = await fetchCSV(CSV_URL);

      const data = parseCSV(csvText);

      console.log(data);

      renderTable(data);

    } catch (error) {
      console.error(error);

      loadingEl.style.display = "none";
      errorEl.style.display = "block";
    }
  }

  init();
</script>
