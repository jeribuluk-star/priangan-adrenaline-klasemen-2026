<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klasemen Priangan Adrenaline 2026</title>

<style>

body{
    margin:0;
    padding:20px;
    background:#f3f4f6;
    font-family:Arial,sans-serif;
}

.container{
    max-width:1100px;
    margin:auto;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.header{
    background:linear-gradient(135deg,#07142c,#10264a);

    padding:25px;
}

.title{
    font-size:30px;
    font-weight:bold;
}

.subtitle{
    margin-top:10px;
    color:#d1d5db;

.stats{
    display:grid;
    grid-template-columns:repeat(3,1fr);

.stat-box{
    background:#0b1f3d;
    padding:15px;

.stat-number{
    font-size:28px;

table{
    width:100%;

th{
    background:#111827;

td{
    padding:10px;
    border-bottom:1px solid #e5e7eb;
    text-align:center;
}

tr:nth-child(even){
    background:#f9fafb;
}

.rank1{
    background:#fef3c7 !important;
}

.rank2{
    background:#e5e7eb !important;
}

.rank3{
    background:#fed7aa !important;
}

.loading{
    padding:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="title">
Klasemen Tim Terbaik — Priangan Adrenaline 2026
</div>

<div class="subtitle">
Data otomatis dari Google Sheets
</div>

<div class="stats">

<div class="stat-box">
<div>Total Loft</div>
<div class="stat-number" id="totalPeserta">0</div>
</div>

<div class="stat-box">
<div>Poin Tertinggi</div>
<div class="stat-number" id="maxPoin">0</div>
</div>

<div class="stat-box">
<div>POS Selesai</div>
<div class="stat-number">2</div>
</div>

</div>
</div>

<div class="content">

<div id="loading" class="loading">
Memuat data...
</div>

<table id="table" style="display:none;">

<thead>
<tr>
<th>Rank</th>
<th>Kandang</th>
<th>P1</th>
<th>P2</th>
<th>Total</th>
</tr>
</thead>

<tbody id="tbody">
</tbody>

</table>

</div>

</div>

<script>

const CSV_URL =
"https://docs.google.com/spreadsheets/d/e/2PACX-1vSTkGGJUeTYJw09T7R-CnYABJFTxS8nHETcIGY84J4kOYD4H9lDjvZB_53FbB0wEDqvICfNHdFWvos8/pub?gid=0&single=true&output=csv";

async function loadData(){

    const response = await fetch(CSV_URL);

    const csv = await response.text();

    const lines = csv.split("\n");

    let startIndex = lines.findIndex(line =>
        line.includes("NAMA_KANDANG")
    );

    const headers = lines[startIndex]
        .split(",")
        .map(h => h.trim());

    const rows = [];

    for(let i = startIndex + 1; i < lines.length; i++){

        const values = lines[i]
            .split(",")
            .map(v => v.trim());

        if(values.length < 2) continue;

        const row = {};

        headers.forEach((h,index)=>{
            row[h] = values[index] || "";
        });

        if(row["NAMA_KANDANG"]){
            rows.push(row);
        }
    }

    rows.sort((a,b)=>
        Number(b.Total || 0) -
        Number(a.Total || 0)
    );

    const tbody = document.getElementById("tbody");

    rows.forEach((row,index)=>{

        const tr = document.createElement("tr");

        if(index===0) tr.classList.add("rank1");
        if(index===1) tr.classList.add("rank2");
        if(index===2) tr.classList.add("rank3");

        tr.innerHTML = `
        <td>${index+1}</td>
        <td>${row["NAMA_KANDANG"]}</td>
        <td>${row["POS_1"] || "-"}</td>
        <td>${row["POS_2"] || "-"}</td>
        <td><b>${row["Total"] || 0}</b></td>
        `;

        tbody.appendChild(tr);
    });

    document.getElementById("loading").style.display="none";
    document.getElementById("table").style.display="table";

    document.getElementById("totalPeserta").textContent =
        rows.length;

    document.getElementById("maxPoin").textContent =
        rows[0]?.Total || 0;
}

loadData();

</script>

</body>
</html>
